compute_environment: LOCAL_MACHINE

# Single-node: 1 machine. For multi-node, change num_machines and set
# machine_rank per node, plus main_process_ip / main_process_port.
num_machines: 1
machine_rank: 0

# 8 GPUs per node. For multi-node: num_machines * gpus_per_node.
num_processes: 8

distributed_type: FSDP

mixed_precision: bf16

downcast_bf16: "no"

fsdp_config:
  sharding_strategy: FULL_SHARD
  auto_wrap_policy: TRANSFORMER_BASED_WRAP
  backward_prefetch: BACKWARD_PRE
  forward_prefetch: false
  use_orig_params: true
  offload_param: true
  offload_optimizer: true
  state_dict_type: FULL_STATE_DICT
