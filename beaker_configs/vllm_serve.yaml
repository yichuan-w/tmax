version: v2
budget: ai2/oe-adapt
description: "VLLM Server for TassieAgent eval"
tasks:
  - name: "vllm-job"
    image:
      beaker: ai2/pytorch2.0.0-cuda11.8-python3.10
    hostNetworking: true
    command: ["/bin/sh", "-c"]
    arguments:
      - >-
        pip install vllm==0.19.1 &&
        vllm serve {{MODEL_PATH}}
        --revision {{REVISION}}
        --tokenizer-revision {{REVISION}}
        --served-model-name {{SERVED_MODEL_NAME}}
        --enable-auto-tool-choice
        --tool-call-parser hermes
        --port 8008
        --max-model-len 32768
        --gpu-memory-utilization 0.95
        --tensor-parallel-size {{GPU_COUNT}}
    envVars:
      - name: HF_TOKEN
        secret: HF_TOKEN
    datasets:
      - mountPath: /weka/oe-adapt-default
        source:
          weka: oe-adapt-default
    constraints:
      cluster:
        - ai2/saturn
    resources:
      gpuCount: 1
    context:
      priority: high
      preemptible: false
